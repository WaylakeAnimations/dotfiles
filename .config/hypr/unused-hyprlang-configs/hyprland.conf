#-- Modifier --#
$mainMod = SUPER

#----------------------#
#----- Autostarts -----#
#----------------------#

exec-once = hyprctl plugin load ~/Hypr-DarkWindow/out/hypr-darkwindow.so

exec-once = bash ~/.local/share/lakeside-rice-loader/lsrl.sh -r

# exec-once = bash /home/Waylake/.config/waybar-quotes/quote_picker.sh
# exec-once = waybar -c ~/.config/waybar-quotes/config.jsonc -s ~/.config/waybar-quotes/style.css

exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = xhost +SI:localuser:root

# exec-once = hyprpaper --config ~/.config/hypr/hyprpaper.conf
# exec-once = waybar -c ~/.config/waybar/config.jsonc -s ~/.config/waybar/style.css
exec-once = /usr/bin/blueman-applet
exec-once = swaync -c ~/.config/swaync/config.json -s ~/.config/swaync/style.css
exec-once = nm-applet

exec-once = gammastep -O 4500K
exec-once = dbus-update-activation-environment --systemd --all

exec-once = walker --gapplication-service
exec-once = systemctl --user start elephant

# exec = hyprlock -c ~/.config/hypr/hyprlock-entry.conf

#------------------------#
#----- Set programs -----#
#------------------------#

$terminal = kitty
$fileManager = thunar
$sufileManager = pkexec thunar
$lockscreen = hyprlock -c ~/.config/hypr/hyprlock.conf
$texedit = mousepad
$sutexedit = pkexec mousepad

# $menu = wofi -I -S drun
$menu = walker --provider desktopapplications --hideqa --theme hyarc-app
$pmenu = walker --provider menus:lake-personal-menu --hideqa -N --theme hyarc-menu

# $shutdown_menu = nwg-bar -s ~/.config/nwg-bar/style.css
$shutdown_menu = walker --provider menus:power-menu --hideqa -N -n --minheight 210 --maxheight 210 --minwidth 160 --maxwidth 160

#-------------------#
#----- Visuals -----#
#-------------------#

#-- Cursor --#
env = HYPRCURSOR_THEME,"Urawa Hanako (3D)"
env = HYPRCURSOR_SIZE,24
# exec-once = hyprctl setcursor "Urawa Hanako (3D)" 24
# exec-once = gsettings set org.gnome.desktop.interface cursor-theme "Urawa Hanako (3D)"

#-- Misc --#

$accent = rgb(3498db)
$urgent = rgb(f0544c)
$inactive = rgb(222222)

monitor=,preferred,auto,auto

general {
    gaps_in = 5
    gaps_out = 15
    border_size = 2
    col.active_border = $accent
    col.inactive_border = $inactive
    layout = dwindle
    allow_tearing = true
}

decoration {
    rounding = 10
        blur {
        enabled = true
        size = 5
        passes = 1
	new_optimizations = true
    }
}

animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 3, myBezier
    animation = windowsOut, 1, 3, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 3, default
    animation = workspaces, 1, 5, default
}

#-----------------#
#----- Rules -----#
#-----------------#

# "rules are disabled until i have the time to look at the wiki and actually fix this"
# "nevermind, it's fixed now" - wl, 2026

windowrule = match:class *, immediate on

layerrule = match:namespace swaync-control-center, ignore_alpha 0, blur on
layerrule = match:namespace swaync-notification-window, ignore_alpha 0, blur on
layerrule = match:namespace wofi, ignore_alpha 0, blur on
layerrule = match:namespace gtk-layer-shell, ignore_alpha 0, blur on
layerrule = match:namespace walker, ignore_alpha 0, blur on

#------------------------------#
#----- Thunar Extra Rules -----#
#------------------------------#

windowrule {
    name = rename
    match:class = thunar
    match:initial_title = (\bRename\b)[^$]*
    float = on
    size = monitor_w/3 monitor_h/6
    center = on
}

windowrule {
    name = Attention
    match:class = thunar
    match:initial_title = Attention
    center = on
}

windowrule {
    name = replace
    match:class = thunar
    match:initial_title = Confirm to replace files
    center = on
}

windowrule {
    name = File Operation
    match:class = thunar
    match:initial_title = File Operation Progress
    float = on
    size = monitor_w/3 monitor_h/2.5
    move = (monitor_w-(monitor_w/3))-25 (monitor_h-(monitor_h/2.5))-50
}

windowrule {
    name = errors
    match:class = thunar
    match:initial_title =
    center = on
}

#----------------------------#
#----- App Transparency -----#
#----------------------------#

# this uses opt-in system because i need to make sure
# the effect looks good and won't interfere with app usage,
# especially color-sensitive stuff like blender and krita...

# a script i made to turn hypicker output into darkwindow chromakey rule and copy it into clipboard...
# of course, comment the keybind when not in use...

bind = $mainMod, Q, exec, bash ~/.config/hypr/pickerf.sh

$app_opct = 0.85
$sim = 0.2
$amt = 0.1

# source = ~/.config/hypr/darkwindow.conf
# source = ~/.config/hypr/darkwindow-gtk-theme-dependent.conf

#--------------------#
#----- Keybinds -----#
#--------------------#

#-- Launcher and Apps --#
bind = $mainMod, R, exec, $pmenu
bind = $mainMod, D, exec, $menu
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, code:36, exec, $terminal

#-- Windowing --#
bind = $mainMod_SHIFT, SPACE, togglefloating
bind = $mainMod, F, fullscreen

#-- Misc --#
bind = $mainMod_SHIFT, Q, killactive
bind = $mainMod_SHIFT, E, exec, $shutdown_menu

bind = $mainMod, P, exec, grimshot --cursor --notify save screen "$(date +$(echo ~)/Screenshots/Screenshot_%Y-%m-%d_%H-%M-%S.png)"
# "the minute spot used to be taken by month number, but i fixed it now" - wl, 2026

#-- Move window --#
bind = $mainMod_SHIFT, left, movewindow, l
bind = $mainMod_SHIFT, right, movewindow, r
bind = $mainMod_SHIFT, up, movewindow, u
bind = $mainMod_SHIFT, down, movewindow, d

#-- Focus to different window --#
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

#-- Switch workspaces --#
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

#-- Move active window to a workspace --#
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#--------------------#
#----- Env Vars -----#
#--------------------#

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = WLR_DRM_NO_ATOMIC,1

#----------------#
#----- Misc -----#
#----------------#

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    accel_profile = flat
    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0
}

dwindle {
    preserve_split = yes
}

misc {
    disable_hyprland_logo = true
    enable_anr_dialog = false
}

debug {
    disable_logs = true
}
 
source = ~/.lsrl-loaded/.config/hypr/hyprland-lr.conf